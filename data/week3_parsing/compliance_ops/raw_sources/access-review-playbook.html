  <body>
    <main>
      <article>
        <h1>临时访问复核流程</h1>
        <p>临时访问权限在开通后必须进入复核队列，避免长期残留的高权限账号继续保留。</p>
        <h2>复核时点</h2>
        <p>开通后 24 小时内完成第一次复核，超过 7 天仍未关闭的访问申请需要升级到数据治理负责人。</p>
        <h2>复核证据</h2>
        <p>复核时至少检查工单编号、审批链、访问对象、导出动作和关闭结果，必要时补充截图与审计日志。</p>
      </article>
    </main>
  </body>
</html>
