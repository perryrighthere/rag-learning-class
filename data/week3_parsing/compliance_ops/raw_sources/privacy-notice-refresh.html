        <h1>员工隐私告知更新说明</h1>
        <p>本次更新覆盖账号日志、访问审批与导出留痕三个场景，目的是让员工知道哪些操作会被记录以及记录保存多久。</p>
        <h2>适用范围</h2>
        <p>所有访问客户数据、员工数据或内部审计看板的人员都在适用范围内，包含正式员工、外包同事与临时支援账号。</p>
        <h2>记录要求</h2>
        <p>访问审批记录需要保留申请人、审批人、审批时间、访问原因和关闭时间，便于后续做证据追踪。</p>
