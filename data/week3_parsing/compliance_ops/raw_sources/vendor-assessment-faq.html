    <main>
      <article>
        <h1>第三方安全评估 FAQ</h1>
        <p>供应商接入前要先补齐用途说明、数据范围和保存期限，避免后续评估时只剩口头解释。</p>
        <h2>什么时候必须复评</h2>
        <p>一旦供应商新增高敏感字段处理、跨境传输或新的子处理者，就必须重新触发评估。</p>
        <h2>最低交付物</h2>
        <p>评估材料至少包括问卷、整改结论、负责人审批和上线前确认记录。</p>
      </article>
    </main>
  </body>
